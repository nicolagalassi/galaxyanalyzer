<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OGame Universe Tracker Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --input-bg: #2a2a2a;
            --border-color: #333;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --primary: #007bff;
            --primary-hover: #0056b3;
            --success: #28a745;
            --success-hover: #218838;
            --accent: #ffeb3b;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            padding: 15px; 
            margin: 0; 
            line-height: 1.5;
        }
        
        h1 { font-size: 1.8rem; margin-top: 0; text-align: center; color: var(--accent); }
        h2 { font-size: 1.4rem; border-bottom: 2px solid var(--border-color); padding-bottom: 5px; }
        
        /* Contenitori e Controlli */
        .panel { 
            background-color: var(--panel-bg); 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.4); 
            border: 1px solid #2a2a2a;
        }
        
        .controls { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            align-items: flex-end; 
        }
        
        .input-group { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            flex: 1 1 200px; /* Flexbox per adattarsi allo schermo */
        }

        .input-group label { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }
        
        /* Form Elementi */
        select, input[type="text"], button { 
            padding: 12px; 
            border-radius: 6px; 
            border: 1px solid var(--border-color); 
            background: var(--input-bg); 
            color: white; 
            font-size: 1rem; 
            outline: none;
            transition: border-color 0.2s;
        }
        
        select:focus, input[type="text"]:focus { border-color: var(--primary); }
        
        input[type="text"] { width: 100%; box-sizing: border-box; }
        
        button { 
            background-color: var(--primary); 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.3s ease; 
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        button:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        button:disabled { background-color: #555; cursor: not-allowed; transform: none; }
        
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: var(--success-hover); }
        .btn-export { background-color: #17a2b8; }
        .btn-export:hover { background-color: #138496; }

        .flex-row { display: flex; gap: 8px; }
        .flex-row input { flex: 1; }
        .flex-row button { padding: 12px 18px; font-size: 1.2rem; }
        
        /* Grafico, Badge e Tabella */
        .chart-container { 
            background-color: var(--panel-bg); 
            padding: 15px; 
            border-radius: 10px; 
            height: 60vh; 
            min-height: 400px;
            position: relative; 
            width: 100%; 
            box-sizing: border-box; 
            margin-bottom: 20px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            border: 1px solid #2a2a2a;
        }
        
        #loadingMsg { color: var(--accent); font-weight: bold; display: none; width: 100%; text-align: center; margin-top: 10px; }
        
        #activeHighlights { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .badge { 
            padding: 8px 16px; 
            border-radius: 20px; 
            font-size: 0.9rem; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8); 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
        }
        .badge-close { 
            cursor: pointer; 
            background: rgba(0,0,0,0.4); 
            border-radius: 50%; 
            width: 24px; 
            height: 24px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transition: background 0.2s; 
        }
        .badge-close:hover { background: rgba(0,0,0,0.8); }

        .divider { width: 100%; height: 1px; background-color: var(--border-color); margin: 20px 0; }

        .checkbox-container { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            background: var(--input-bg); 
            padding: 12px; 
            border-radius: 6px; 
            border: 1px solid var(--border-color); 
            cursor: pointer; 
            font-size: 0.9rem;
            user-select: none;
            flex: 1;
            justify-content: center;
        }
        .checkbox-container input { cursor: pointer; width: 18px; height: 18px; accent-color: var(--primary); }

        /* Stili Tabelle per Mobile */
        .summary-panel { 
            background-color: var(--panel-bg); 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 20px; 
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            border: 1px solid #2a2a2a;
        }
        
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table { width: 100%; border-collapse: collapse; text-align: center; font-size: 0.9rem; min-width: 600px; }
        th, td { padding: 12px; border: 1px solid var(--border-color); }
        th { background-color: var(--input-bg); color: var(--primary); font-weight: bold; }
        tr:nth-child(even) { background-color: #242424; }
        tr:hover { background-color: #333; }
        .galaxy-col { font-weight: bold; background-color: var(--input-bg); color: var(--accent); width: 80px; }
        
        .player-item { font-size: 0.85rem; padding: 5px 0; border-bottom: 1px dashed #444; color: #ddd; }
        .player-item:last-child { border-bottom: none; }

        .scrollable-list { max-height: 80px; overflow-y: auto; font-size: 0.8rem; color: #bbb; line-height: 1.6; padding-right: 5px; }
        .scrollable-list::-webkit-scrollbar { width: 4px; }
        .scrollable-list::-webkit-scrollbar-track { background: var(--input-bg); }
        .scrollable-list::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
        .slot-count { font-weight: bold; color: var(--success); margin-top: 8px; font-size: 0.85rem; border-top: 1px solid #444; padding-top: 6px; }

        #exportControls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        #exportControls button {
            flex: 1;
            min-width: 150px;
        }

        /* Media Queries per Smartphone */
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 1.5rem; }
            .panel { padding: 15px; }
            .checkbox-container { justify-content: flex-start; }
            .flex-row button { padding: 12px 15px; }
            th, td { padding: 8px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <h1>Tracker Strategico OGame</h1>
    
    <div class="panel">
        <div class="controls" id="loadSection">
            <div class="input-group">
                <label for="countrySelect">Community (Paese):</label>
                <select id="countrySelect">
                    <option value="it" selected>Italia (IT)</option>
                    <option value="en">Internazionale (EN)</option>
                    <option value="de">Germania (DE)</option>
                    <option value="fr">Francia (FR)</option>
                    <option value="es">Spagna (ES)</option>
                </select>
            </div>

            <div class="input-group">
                <label for="universeSelect">Universo:</label>
                <select id="universeSelect">
                    <option value="">Seleziona un Paese prima...</option>
                </select>
            </div>

            <div class="input-group">
                <button id="loadBtn" style="height: 100%; padding: 12px;">1. Scarica Dati Server</button>
            </div>
            <span id="loadingMsg">Scaricamento dati in corso...</span>
        </div>

        <div class="divider" id="dividerLine" style="display: none;"></div>

        <div class="controls" id="actionSection" style="display: none;">
            <div class="input-group">
                <label for="playerName">Cerca Giocatore:</label>
                <div class="flex-row">
                    <input type="text" id="playerName" placeholder="Es. Legolas">
                    <button id="addPlayerBtn" class="btn-success">+</button>
                </div>
            </div>

            <div class="input-group">
                <label for="allianceInput">Cerca Alleanza:</label>
                <div class="flex-row">
                    <input type="text" id="allianceInput" list="allianceList" placeholder="Es. Nome o Tag">
                    <datalist id="allianceList"></datalist>
                    <button id="addAllianceBtn" class="btn-success">+</button>
                </div>
            </div>

            <div class="input-group" style="flex-direction: row; flex-wrap: wrap; gap: 10px;">
                <label class="checkbox-container">
                    <input type="checkbox" id="toggleFreeSlots">
                    Slot 8/15
                </label>
                <label class="checkbox-container">
                    <input type="checkbox" id="toggleBackground" checked>
                    Sfondo Mappa
                </label>
            </div>
        </div>

        <div id="activeHighlights"></div>
        
        <div id="exportControls" style="display: none;">
            <button id="copyDataBtn" class="btn-export">📋 Copia Elenco Posizioni</button>
            <button id="exportCsvBtn" class="btn-export">⬇️ Scarica CSV</button>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="universeMap"></canvas>
    </div>

    <div class="summary-panel" id="allianceSummaryPanel" style="display: none;">
        <h2>Dettaglio Alleanze Evidenziate</h2>
        <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: -5px; margin-bottom: 15px;">
            Distribuzione dei giocatori. Fai scorrere la tabella lateralmente per vedere tutte le colonne.
        </p>
        <div class="table-responsive" id="allianceTableContainer"></div>
    </div>

    <div class="summary-panel" id="summaryPanel" style="display: none;">
        <h2>Densità Pianeti (Globale)</h2>
        <div class="table-responsive" id="tableContainer"></div>
    </div>

    <div class="summary-panel" id="freeSlotsPanel" style="display: none;">
        <h2>Posizioni Strategiche Libere (Slot 8 e 15)</h2>
        <div class="table-responsive" id="freeSlotsContainer"></div>
    </div>

    <script>
        const proxyBaseUrl = '/.netlify/functions/proxy?url=';
        let chartInstance = null;

        // --- CACHE DATI ---
        let baseDensityDataset = null; 
        let allPlanetsList = []; 
        let playersMap = {}; 
        let alliancesMap = {}; 
        let occupiedPositions = new Set(); 
        let maxGalaxies = 9; 
        
        // --- STATO ATTIVO ---
        let activeLayers = []; 
        
        const colorPalette = [
            'rgba(255, 99, 132, 1)', 'rgba(75, 192, 192, 1)', 'rgba(255, 206, 86, 1)', 
            'rgba(153, 102, 255, 1)', 'rgba(255, 159, 64, 1)', 'rgba(54, 235, 114, 1)', 
            'rgba(235, 54, 184, 1)', 'rgba(255, 255, 255, 1)', 'rgba(0, 123, 255, 1)', 
            'rgba(232, 62, 140, 1)', 'rgba(32, 201, 151, 1)', 'rgba(253, 126, 20, 1)'
        ];
        let colorIndex = 0;

        // --- ELEMENTI DOM ---
        const countrySelect = document.getElementById('countrySelect');
        const universeSelect = document.getElementById('universeSelect');
        const loadBtn = document.getElementById('loadBtn');
        const loadingMsg = document.getElementById('loadingMsg');
        const actionSection = document.getElementById('actionSection');
        const dividerLine = document.getElementById('dividerLine');
        const allianceList = document.getElementById('allianceList');
        const toggleBackground = document.getElementById('toggleBackground');
        const toggleFreeSlots = document.getElementById('toggleFreeSlots');
        const summaryPanel = document.getElementById('summaryPanel');
        const tableContainer = document.getElementById('tableContainer');
        const allianceSummaryPanel = document.getElementById('allianceSummaryPanel');
        const allianceTableContainer = document.getElementById('allianceTableContainer');
        const freeSlotsPanel = document.getElementById('freeSlotsPanel');
        const freeSlotsContainer = document.getElementById('freeSlotsContainer');
        const exportControls = document.getElementById('exportControls');
        const copyDataBtn = document.getElementById('copyDataBtn');
        const exportCsvBtn = document.getElementById('exportCsvBtn');

        async function fetchXML(targetUrl) {
            const response = await fetch(proxyBaseUrl + encodeURIComponent(targetUrl));
            if (!response.ok) throw new Error('Errore di rete');
            const text = await response.text();
            return new DOMParser().parseFromString(text, "text/xml");
        }

        async function loadUniverses() {
            const country = countrySelect.value;
            universeSelect.innerHTML = '<option value="">Caricamento...</option>';
            loadBtn.disabled = true;

            try {
                const xmlDoc = await fetchXML(`https://s269-${country}.ogame.gameforge.com/api/universes.xml`);
                const universes = xmlDoc.getElementsByTagName('universe');
                
                universeSelect.innerHTML = '';
                for(let i = 0; i < universes.length; i++) {
                    const id = universes[i].getAttribute('id');
                    const href = universes[i].getAttribute('href');
                    
                    const option = document.createElement('option');
                    option.value = href;
                    option.text = `Universo ${id} ...`;
                    universeSelect.appendChild(option);

                    fetchXML(`${href}/api/serverData.xml`).then(serverXml => {
                        const nameNodes = serverXml.getElementsByTagName('name');
                        if (nameNodes.length > 0) {
                            option.text = `Universo ${id} (${nameNodes[0].textContent})`;
                        } else {
                            option.text = `Universo ${id}`;
                        }
                    }).catch(err => {
                        option.text = `Universo ${id}`; 
                    });
                }
                loadBtn.disabled = false;
            } catch (error) {
                universeSelect.innerHTML = '<option value="">Errore API</option>';
            }
        }
        countrySelect.addEventListener('change', loadUniverses);
        window.addEventListener('DOMContentLoaded', loadUniverses);

        loadBtn.addEventListener('click', async () => {
            const universeUrl = universeSelect.value;
            if (!universeUrl) return;

            loadingMsg.style.display = 'block';
            loadBtn.disabled = true;
            countrySelect.disabled = true;
            universeSelect.disabled = true;

            try {
                const [universeXml, playersXml, alliancesXml, serverDataXml] = await Promise.all([
                    fetchXML(`${universeUrl}/api/universe.xml`),
                    fetchXML(`${universeUrl}/api/players.xml`),
                    fetchXML(`${universeUrl}/api/alliances.xml`),
                    fetchXML(`${universeUrl}/api/serverData.xml`)
                ]);

                const galaxyNode = serverDataXml.getElementsByTagName('galaxies');
                if (galaxyNode.length > 0) {
                    maxGalaxies = parseInt(galaxyNode[0].textContent, 10);
                } else {
                    maxGalaxies = 9;
                }

                parseAlliances(alliancesXml);
                parsePlayers(playersXml);
                parseUniverseAndRenderBase(universeXml);

                dividerLine.style.display = 'block';
                actionSection.style.display = 'flex';
                summaryPanel.style.display = 'block';
                
                activeLayers = []; 
                colorIndex = 0;
                toggleBackground.checked = true; 
                renderHighlights();
                updateChart();
                generateDensitySummary(); 
                
                if (toggleFreeSlots.checked) {
                    freeSlotsPanel.style.display = 'block';
                    generateFreeSlotsSummary();
                }

                renderAllianceSummaries(); 

                loadBtn.textContent = "Dati Aggiornati ✓";
                setTimeout(() => { loadBtn.textContent = "1. Ricarica Dati Server"; }, 3000);

            } catch (error) {
                alert("Errore nello scaricamento dei dati XML.");
                console.error(error);
            } finally {
                loadingMsg.style.display = 'none';
                loadBtn.disabled = false;
                countrySelect.disabled = false;
                universeSelect.disabled = false;
            }
        });

        function parseAlliances(xmlDoc) {
            alliancesMap = {};
            allianceList.innerHTML = ''; 
            const alliances = xmlDoc.getElementsByTagName('alliance');
            for (let i = 0; i < alliances.length; i++) {
                const id = alliances[i].getAttribute('id');
                const tag = alliances[i].getAttribute('tag');
                const name = alliances[i].getAttribute('name');
                alliancesMap[id] = { tag, name };
                const option = document.createElement('option');
                option.value = `[${tag}] ${name}`; 
                allianceList.appendChild(option);
            }
        }

        function getReadableStatus(statusStr) {
            if (!statusStr) return "Attivo";
            let labels = [];
            if (statusStr.includes('v')) labels.push("Vacanza");
            if (statusStr.includes('i') || statusStr.includes('I')) labels.push("Inattivo");
            if (statusStr.includes('b')) labels.push("Bannato");
            if (statusStr.includes('o')) labels.push("Fuorilegge");
            if (statusStr.includes('a')) labels.push("Admin");
            return labels.length > 0 ? labels.join(', ') : "Sconosciuto";
        }

        function parsePlayers(xmlDoc) {
            playersMap = {};
            const players = xmlDoc.getElementsByTagName('player');
            for (let i = 0; i < players.length; i++) {
                const id = players[i].getAttribute('id');
                const name = players[i].getAttribute('name');
                const allianceId = players[i].getAttribute('alliance'); 
                const statusStr = players[i].getAttribute('status'); 
                
                playersMap[id] = { 
                    name: name,
                    nameLower: name.toLowerCase(),
                    allianceId: allianceId,
                    statusText: getReadableStatus(statusStr)
                };
            }
        }

        function parseUniverseAndRenderBase(xmlDoc) {
            const planets = xmlDoc.getElementsByTagName('planet');
            const densityMap = {};
            allPlanetsList = []; 
            occupiedPositions.clear();

            for (let i = 0; i < planets.length; i++) {
                const planet = planets[i];
                const coords = planet.getAttribute('coords');
                const playerId = planet.getAttribute('player');

                if (!coords) continue;
                
                const parts = coords.split(':');
                const galaxy = parseInt(parts[0], 10);
                const system = parseInt(parts[1], 10);
                const position = parseInt(parts[2], 10);
                
                if (galaxy > maxGalaxies) continue;

                // Salvataggio preciso di G, S, e Posizione
                allPlanetsList.push({ g: galaxy, s: system, p: position, playerId: playerId });
                occupiedPositions.add(`${galaxy}-${system}-${position}`);

                const key = `${galaxy}-${system}`;
                if (!densityMap[key]) densityMap[key] = { g: galaxy, s: system, count: 0 };
                densityMap[key].count += 1;
            }

            const universeDataArray = Object.values(densityMap).map(item => ({
                x: item.s,
                y: item.g,
                r: Math.max(1.5, item.count * 1.2)
            }));

            baseDensityDataset = {
                label: 'Densità Universo',
                data: universeDataArray,
                backgroundColor: 'rgba(54, 162, 235, 0.2)',
                borderColor: 'rgba(54, 162, 235, 0.4)',
                borderWidth: 1,
                hidden: false
            };
            
            initChart();
        }

        // --- TABELLA POSIZIONI LIBERE (8 e 15) ---
        function generateFreeSlotsSummary() {
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Galassia</th>
                            <th>Slot 8 Libero (Sistemi)</th>
                            <th>Slot 15 Libero (Sistemi)</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            for (let g = 1; g <= maxGalaxies; g++) {
                let free8 = [];
                let free15 = [];
                
                for (let s = 1; s <= 499; s++) {
                    if (!occupiedPositions.has(`${g}-${s}-8`)) free8.push(s);
                    if (!occupiedPositions.has(`${g}-${s}-15`)) free15.push(s);
                }

                html += `
                    <tr>
                        <td class="galaxy-col">G ${g}</td>
                        <td style="text-align: left; vertical-align: top; width: 40%;">
                            <div class="scrollable-list">
                                ${free8.length > 0 ? free8.join(', ') : '<span style="color: #ff4c4c;">Nessuna</span>'}
                            </div>
                            <div class="slot-count">Totale: ${free8.length}</div>
                        </td>
                        <td style="text-align: left; vertical-align: top; width: 40%;">
                            <div class="scrollable-list">
                                ${free15.length > 0 ? free15.join(', ') : '<span style="color: #ff4c4c;">Nessuna</span>'}
                            </div>
                            <div class="slot-count">Totale: ${free15.length}</div>
                        </td>
                    </tr>
                `;
            }

            html += `</tbody></table>`;
            freeSlotsContainer.innerHTML = html;
        }

        toggleFreeSlots.addEventListener('change', (e) => {
            if (e.target.checked && allPlanetsList.length > 0) {
                freeSlotsPanel.style.display = 'block';
                generateFreeSlotsSummary();
            } else {
                freeSlotsPanel.style.display = 'none';
            }
        });

        // --- TABELLA DENSITÀ GLOBALE ---
        function generateDensitySummary() {
            const ranges = {};
            for(let g = 1; g <= maxGalaxies; g++) ranges[g] = [0,0,0,0,0];

            allPlanetsList.forEach(p => {
                if (p.g < 1 || p.g > maxGalaxies) return;
                let rangeIdx = 0;
                if (p.s > 100 && p.s <= 200) rangeIdx = 1;
                else if (p.s > 200 && p.s <= 300) rangeIdx = 2;
                else if (p.s > 300 && p.s <= 400) rangeIdx = 3;
                else if (p.s > 400) rangeIdx = 4;
                
                ranges[p.g][rangeIdx]++;
            });

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Galassia</th>
                            <th>Sis. 1-100</th>
                            <th>Sis. 101-200</th>
                            <th>Sis. 201-300</th>
                            <th>Sis. 301-400</th>
                            <th>Sis. 401-499</th>
                            <th>Totale</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            for (let g = 1; g <= maxGalaxies; g++) {
                const rData = ranges[g];
                const total = rData.reduce((a, b) => a + b, 0);
                html += `
                    <tr>
                        <td class="galaxy-col">G ${g}</td>
                        <td>${rData[0]}</td>
                        <td>${rData[1]}</td>
                        <td>${rData[2]}</td>
                        <td>${rData[3]}</td>
                        <td>${rData[4]}</td>
                        <td style="font-weight:bold; color:var(--success);">${total}</td>
                    </tr>
                `;
            }
            html += `</tbody></table>`;
            tableContainer.innerHTML = html;
        }

        function renderAllianceSummaries() {
            const container = document.getElementById('allianceTableContainer');
            container.innerHTML = '';
            
            const allianceLayers = activeLayers.filter(layer => layer.type === 'alliance');
            
            if (allianceLayers.length === 0) {
                allianceSummaryPanel.style.display = 'none';
                return;
            }
            
            allianceSummaryPanel.style.display = 'block';

            const combinedGrid = {};
            for (let g = 1; g <= maxGalaxies; g++) combinedGrid[g] = [[], [], [], [], []];

            const allAllyPlanets = [];
            allianceLayers.forEach(layer => {
                layer.dataset.data.forEach(p => {
                    allAllyPlanets.push({
                        ...p, 
                        allianceTag: layer.allianceTag,
                        color: layer.color
                    });
                });
            });

            allAllyPlanets.forEach(p => {
                const g = p.y;
                const s = p.x;
                if (g >= 1 && g <= maxGalaxies) {
                    let rangeIdx = 0;
                    if (s > 100 && s <= 200) rangeIdx = 1;
                    else if (s > 200 && s <= 300) rangeIdx = 2;
                    else if (s > 300 && s <= 400) rangeIdx = 3;
                    else if (s > 400) rangeIdx = 4;
                    
                    combinedGrid[g][rangeIdx].push({ name: p.playerName, tag: p.allianceTag, color: p.color });
                }
            });

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Galassia</th>
                            <th>Sis. 1-100</th>
                            <th>Sis. 101-200</th>
                            <th>Sis. 201-300</th>
                            <th>Sis. 301-400</th>
                            <th>Sis. 401-499</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            for (let g = 1; g <= maxGalaxies; g++) {
                html += `<tr><td class="galaxy-col">G ${g}</td>`;
                
                for(let rangeIdx=0; rangeIdx<5; rangeIdx++) {
                    const cellPlanets = combinedGrid[g][rangeIdx];
                    let cellHtml = '';
                    
                    if (cellPlanets.length > 0) {
                        const conteggio = {};
                        cellPlanets.forEach(p => {
                            const key = `${p.name}___${p.tag}___${p.color}`;
                            conteggio[key] = (conteggio[key] || 0) + 1;
                        });
                        
                        const playerStrings = Object.entries(conteggio).map(([key, count]) => {
                            const [name, tag, color] = key.split('___');
                            return `
                                <div class="player-item">
                                    <strong style="color:#fff;">${name}</strong> (${count})
                                    <strong style="color:${color};">[${tag}]</strong>
                                </div>`;
                        }).sort(); 
                        
                        cellHtml = playerStrings.join('');
                    } else {
                        cellHtml = '<span style="color:#555">-</span>';
                    }
                    
                    html += `<td style="vertical-align: top; text-align: left;">${cellHtml}</td>`;
                }
                
                html += `</tr>`;
            }
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function initChart() {
            const ctx = document.getElementById('universeMap').getContext('2d');
            if (chartInstance) chartInstance.destroy(); 

            chartInstance = new Chart(ctx, {
                type: 'bubble',
                data: { datasets: [baseDensityDataset] }, 
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { 
                            title: { display: true, text: 'Sistema Solare (1 - 499)', color: '#fff' }, 
                            min: 0, 
                            max: 500, 
                            ticks: { color: '#bbb' }, 
                            grid: { color: 'rgba(255,255,255,0.1)' } 
                        },
                        y: { 
                            title: { display: true, text: `Galassia (1 - ${maxGalaxies})`, color: '#fff' }, 
                            min: 0, 
                            max: maxGalaxies + 1, 
                            reverse: true, 
                            ticks: { color: '#bbb', stepSize: 1 }, 
                            grid: { color: 'rgba(255,255,255,0.1)' } 
                        }
                    },
                    plugins: {
                        legend: { display: false }, 
                        tooltip: {
                            callbacks: {
                                label: function(ctx) {
                                    if (ctx.datasetIndex === 0) {
                                        const count = Math.round(ctx.raw.r / 1.2);
                                        return `Sfondo - [${ctx.raw.y}:${ctx.raw.x}] - Tot. Pianeti: ${count}`;
                                    } else {
                                        const statusStr = ctx.raw.playerStatus ? ` (${ctx.raw.playerStatus})` : '';
                                        const playerInfo = ctx.raw.playerName ? ` - ${ctx.raw.playerName}` : '';
                                        // Ora mostra anche la posizione esatta nel tooltip
                                        const pos = ctx.raw.p ? `:${ctx.raw.p}` : '';
                                        return `${ctx.dataset.label}${playerInfo}${statusStr} -> [${ctx.raw.y}:${ctx.raw.x}${pos}]`;
                                    }
                                }
                            }
                        }
                    }
                }
            });
        }

        function updateChart() {
            chartInstance.data.datasets = [baseDensityDataset, ...activeLayers.map(layer => layer.dataset)];
            chartInstance.update();
        }

        toggleBackground.addEventListener('change', (e) => {
            baseDensityDataset.hidden = !e.target.checked;
            updateChart();
        });

        function renderHighlights() {
            const container = document.getElementById('activeHighlights');
            container.innerHTML = '';
            
            activeLayers.forEach((layer, index) => {
                const badge = document.createElement('div');
                badge.className = 'badge';
                badge.style.backgroundColor = layer.dataset.backgroundColor;
                
                badge.innerHTML = `
                    <span>${layer.label}</span>
                    <div class="badge-close" onclick="removeHighlight(${index})">X</div>
                `;
                container.appendChild(badge);
            });

            // Mostra o nascondi bottoni Export
            if(activeLayers.length > 0) {
                exportControls.style.display = 'flex';
            } else {
                exportControls.style.display = 'none';
            }
        }

        window.removeHighlight = function(index) {
            activeLayers.splice(index, 1);
            renderHighlights();
            updateChart();
            renderAllianceSummaries(); 
        };

        function getNextColor() {
            const color = colorPalette[colorIndex];
            colorIndex = (colorIndex + 1) % colorPalette.length;
            return color;
        }

        // --- AGGIUNTA GIOCATORI E ALLEANZE ---
        document.getElementById('addPlayerBtn').addEventListener('click', () => {
            const inputVal = document.getElementById('playerName').value.trim().toLowerCase();
            if (!inputVal) return;

            let targetId = null;
            for (const [id, data] of Object.entries(playersMap)) {
                if (data.nameLower === inputVal) {
                    targetId = id;
                    break;
                }
            }

            if (!targetId) return alert("Giocatore non trovato.");
            const pData = playersMap[targetId];

            const playerSpots = allPlanetsList
                .filter(p => p.playerId === targetId)
                .map(p => ({ 
                    x: p.s, y: p.g, p: p.p, r: 8, 
                    playerName: pData.name, // Aggiunto per export
                    playerStatus: pData.statusText 
                }));

            if (playerSpots.length === 0) return alert("Il giocatore non ha pianeti registrati.");

            activeLayers.push({
                type: 'player',
                label: `Ply: ${pData.name}`,
                allianceTag: '', // Vuoto per player singolo
                dataset: {
                    label: `Ply: ${pData.name}`,
                    data: playerSpots,
                    backgroundColor: getNextColor(),
                    borderColor: 'rgba(0,0,0,0.8)',
                    borderWidth: 2
                }
            });

            document.getElementById('playerName').value = ""; 
            renderHighlights();
            updateChart();
        });

        document.getElementById('addAllianceBtn').addEventListener('click', () => {
            const inputVal = document.getElementById('allianceInput').value.trim().toLowerCase();
            if (!inputVal) return;

            let targetId = null;
            for (const [id, data] of Object.entries(alliancesMap)) {
                const fullString = `[${data.tag}] ${data.name}`.toLowerCase();
                if (fullString === inputVal || data.tag.toLowerCase() === inputVal || data.name.toLowerCase() === inputVal) {
                    targetId = id;
                    break;
                }
            }

            if (!targetId) return alert("Alleanza non trovata.");

            const allianceSpots = [];
            allPlanetsList.forEach(p => {
                const player = playersMap[p.playerId];
                if (player && player.allianceId === targetId) {
                    allianceSpots.push({ 
                        x: p.s, y: p.g, p: p.p, r: 7, 
                        playerName: player.name, 
                        playerStatus: player.statusText 
                    });
                }
            });

            if (allianceSpots.length === 0) return alert("Nessun pianeta trovato per questa alleanza.");

            const layerColor = getNextColor();
            const allianceTag = alliancesMap[targetId].tag;

            activeLayers.push({
                type: 'alliance',
                label: `Ally: [${allianceTag}]`,
                allianceTag: allianceTag,
                color: layerColor,
                dataset: {
                    label: `Ally: [${allianceTag}]`,
                    data: allianceSpots,
                    backgroundColor: layerColor,
                    borderColor: 'rgba(255,255,255,0.8)',
                    borderWidth: 1.5
                }
            });

            document.getElementById('allianceInput').value = ""; 
            renderHighlights();
            updateChart();
            renderAllianceSummaries(); 
        });

        // --- SISTEMA DI ESPORTAZIONE (COPIA / CSV) ---
        function getExportData() {
            let exportList = [];
            activeLayers.forEach(layer => {
                layer.dataset.data.forEach(p => {
                    exportList.push({
                        name: p.playerName,
                        tag: layer.allianceTag,
                        g: p.y,
                        s: p.x,
                        p: p.p,
                        status: p.playerStatus
                    });
                });
            });

            // Ordina per Galassia -> Sistema -> Posizione
            exportList.sort((a, b) => {
                if (a.g !== b.g) return a.g - b.g;
                if (a.s !== b.s) return a.s - b.s;
                return a.p - b.p;
            });

            return exportList;
        }

        copyDataBtn.addEventListener('click', () => {
            const data = getExportData();
            if (data.length === 0) return alert("Nessun dato da copiare.");

            let text = "Elenco Posizioni OGame\n========================\n";
            data.forEach(d => {
                let tagStr = d.tag ? `[${d.tag}] ` : '';
                text += `${tagStr}${d.name} -> [${d.g}:${d.s}:${d.p}] (${d.status})\n`;
            });

            navigator.clipboard.writeText(text).then(() => {
                const originalText = copyDataBtn.innerHTML;
                copyDataBtn.innerHTML = "✅ Testo Copiato!";
                setTimeout(() => { copyDataBtn.innerHTML = originalText; }, 2000);
            }).catch(err => {
                alert("Errore durante la copia.");
            });
        });

        exportCsvBtn.addEventListener('click', () => {
            const data = getExportData();
            if (data.length === 0) return alert("Nessun dato da esportare.");

            let csv = "Giocatore,Alleanza,Galassia,Sistema,Posizione,Coordinate,Stato\n";
            data.forEach(d => {
                let safeName = d.name.replace(/"/g, '""');
                let coords = `[${d.g}:${d.s}:${d.p}]`;
                csv += `"${safeName}","${d.tag || ''}",${d.g},${d.s},${d.p},"${coords}","${d.status}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "ogame_posizioni.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

    </script>
</body>
</html>
