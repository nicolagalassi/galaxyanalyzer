<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terminale Strategico Universo</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        scifi: ['Rajdhani', 'sans-serif'],
                    },
                    colors: {
                        scifi: {
                            bg: '#0a0b10',        /* Sfondo profondo */
                            panel: '#131520',     /* Sfondo pannelli */
                            border: '#1f2937',    /* Bordi neutri */
                            accent: '#00f0ff',    /* Ciano Neon */
                            accentHover: '#00c3cc',
                            text: '#e2e8f0',      /* Testo chiaro */
                            muted: '#64748b',     /* Testo disattivato */
                            success: '#39ff14',   /* Verde Neon */
                            danger: '#ff003c',    /* Rosso Neon */
                        }
                    },
                    boxShadow: {
                        'neon-cyan': '0 0 10px rgba(0, 240, 255, 0.3)',
                        'neon-green': '0 0 10px rgba(57, 255, 20, 0.3)',
                    }
                }
            }
        }
    </script>

    <style>
        /* Stili Globali Personalizzati */
        body { 
            background: radial-gradient(circle at center, #131520 0%, #0a0b10 100%);
            min-height: 100vh;
        }

        /* Scrollbar Sci-Fi */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0b10; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00f0ff; }

        /* Effetto Scanline opzionale per feel retro-futuristico */
        .scanlines::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 999;
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* Ottimizzazione Checkbox nativa per abbinarsi al tema */
        input[type="checkbox"] {
            accent-color: #00f0ff;
            width: 1.2rem;
            height: 1.2rem;
            cursor: pointer;
        }
    </style>
</head>
<body class="font-scifi text-scifi-text p-3 md:p-6 scanlines">

    <header class="mb-8 text-center">
        <h1 class="text-3xl md:text-5xl font-bold text-scifi-accent uppercase tracking-wider drop-shadow-[0_0_8px_rgba(0,240,255,0.5)]">
            Terminale Strategico
        </h1>
        <p class="text-scifi-muted mt-2 text-sm uppercase tracking-widest">Inizializzazione Sistema di Mappatura</p>
    </header>
    
    <div class="bg-scifi-panel border border-scifi-accent/30 rounded-lg p-5 mb-6 shadow-neon-cyan/50 backdrop-blur-sm relative z-10">
        <h2 class="text-xl font-semibold text-scifi-accent mb-4 border-b border-scifi-border pb-2 uppercase">1. Connessione Uplink</h2>
        
        <div class="flex flex-col md:flex-row gap-4 items-end">
            <div class="flex-1 w-full">
                <label class="block text-sm text-scifi-muted mb-1 font-semibold uppercase">Community (Paese):</label>
                <select id="countrySelect" class="w-full bg-scifi-bg border border-scifi-border text-scifi-text p-3 rounded focus:outline-none focus:border-scifi-accent transition-colors">
                    <option value="it" selected>Italia (IT)</option>
                    <option value="en">Internazionale (EN)</option>
                    <option value="de">Germania (DE)</option>
                    <option value="fr">Francia (FR)</option>
                    <option value="es">Spagna (ES)</option>
                </select>
            </div>

            <div class="flex-1 w-full">
                <label class="block text-sm text-scifi-muted mb-1 font-semibold uppercase">Server Bersaglio:</label>
                <select id="universeSelect" class="w-full bg-scifi-bg border border-scifi-border text-scifi-text p-3 rounded focus:outline-none focus:border-scifi-accent transition-colors">
                    <option value="">Scansione server in corso...</option>
                </select>
            </div>

            <div class="w-full md:w-auto">
                <button id="loadBtn" class="w-full md:w-auto bg-scifi-accent text-scifi-bg font-bold uppercase tracking-wider py-3 px-6 rounded hover:bg-scifi-accentHover transition-colors shadow-neon-cyan">
                    Avvia Scansione
                </button>
            </div>
        </div>
        
        <div id="loadingStatusContainer" class="hidden mt-4 bg-scifi-bg border border-scifi-border rounded p-3 text-center">
            <span id="loadingMsg" class="text-scifi-accent font-bold uppercase tracking-wider animate-pulse">Avvio procedura...</span>
        </div>

        <div id="apiUpdateInfo" class="hidden mt-4 bg-scifi-bg border border-scifi-success/30 rounded p-3 text-center text-sm">
            <span class="text-scifi-muted uppercase font-semibold">Ultimo aggiornamento Mappa Server:</span> 
            <span id="apiTimestampDisplay" class="text-white font-bold tracking-wider ml-2"></span>
        </div>
    </div>

    <div id="actionSection" class="hidden bg-scifi-panel border border-scifi-border rounded-lg p-5 mb-6 shadow-lg backdrop-blur-sm relative overflow-hidden z-10">
        <div class="absolute top-0 right-0 w-16 h-16 border-t-2 border-r-2 border-scifi-accent/40 rounded-tr-lg pointer-events-none"></div>

        <h2 class="text-xl font-semibold text-scifi-text mb-4 border-b border-scifi-border pb-2 uppercase">2. Parametri Filtro</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <div>
                <label class="block text-sm text-scifi-muted mb-1 font-semibold uppercase">Localizza Entità (Giocatore):</label>
                <div class="flex">
                    <input type="text" id="playerName" placeholder="Es. Legolas" class="flex-1 bg-scifi-bg border border-scifi-border border-r-0 text-scifi-text p-3 rounded-l focus:outline-none focus:border-scifi-accent transition-colors">
                    <button id="addPlayerBtn" class="bg-scifi-border text-scifi-success font-bold px-5 rounded-r hover:bg-scifi-success hover:text-black transition-colors text-xl">+</button>
                </div>
            </div>

            <div>
                <label class="block text-sm text-scifi-muted mb-1 font-semibold uppercase">Localizza Fazione (Alleanza):</label>
                <div class="flex">
                    <input type="text" id="allianceInput" list="allianceList" placeholder="Es. Nome o Tag" class="flex-1 bg-scifi-bg border border-scifi-border border-r-0 text-scifi-text p-3 rounded-l focus:outline-none focus:border-scifi-accent transition-colors">
                    <datalist id="allianceList"></datalist>
                    <button id="addAllianceBtn" class="bg-scifi-border text-scifi-success font-bold px-5 rounded-r hover:bg-scifi-success hover:text-black transition-colors text-xl">+</button>
                </div>
            </div>

            <div class="flex flex-col justify-end gap-3">
                <label class="flex items-center gap-3 bg-scifi-bg p-3 rounded border border-scifi-border cursor-pointer hover:border-scifi-accent/50 transition-colors">
                    <input type="checkbox" id="toggleFreeSlots">
                    <span class="text-sm uppercase font-semibold text-scifi-text">Analisi Slot Vuoti (8/15)</span>
                </label>
                <label class="flex items-center gap-3 bg-scifi-bg p-3 rounded border border-scifi-border cursor-pointer hover:border-scifi-accent/50 transition-colors">
                    <input type="checkbox" id="toggleBackground" checked>
                    <span class="text-sm uppercase font-semibold text-scifi-text">Mostra Radar Background</span>
                </label>
            </div>
        </div>

        <div id="exportControls" class="hidden mt-6 pt-4 border-t border-scifi-border flex flex-wrap gap-4">
            <button id="copyDataBtn" class="flex-1 bg-scifi-border text-scifi-text font-bold uppercase tracking-wider py-2 px-4 rounded hover:bg-gray-700 hover:text-white transition-colors text-sm">
                📋 Copia Coordinate
            </button>
            <button id="exportCsvBtn" class="flex-1 bg-scifi-border text-scifi-text font-bold uppercase tracking-wider py-2 px-4 rounded hover:bg-gray-700 hover:text-white transition-colors text-sm">
                ⬇️ Esporta File CSV
            </button>
        </div>

        <div id="activeHighlights" class="flex flex-wrap gap-3 mt-4"></div>
    </div>

    <div class="bg-scifi-panel border border-scifi-accent/20 rounded-lg p-2 md:p-5 mb-6 shadow-lg h-[65vh] min-h-[400px] w-full relative z-10">
        <canvas id="universeMap"></canvas>
    </div>

    <div id="allianceSummaryPanel" class="hidden bg-scifi-panel border border-scifi-border rounded-lg p-5 mb-6 shadow-lg overflow-x-auto z-10 relative">
        <h2 class="text-xl font-semibold text-scifi-text mb-2 border-b border-scifi-border pb-2 uppercase">Dettaglio Fazioni Evidenziate</h2>
        <div id="allianceTableContainer" class="min-w-[800px] mt-4"></div>
    </div>

    <div id="summaryPanel" class="hidden bg-scifi-panel border border-scifi-border rounded-lg p-5 mb-6 shadow-lg overflow-x-auto z-10 relative">
        <h2 class="text-xl font-semibold text-scifi-text mb-2 border-b border-scifi-border pb-2 uppercase">Rilevamento Densità Settori</h2>
        <div id="tableContainer" class="min-w-[600px] mt-4"></div>
    </div>

    <div id="freeSlotsPanel" class="hidden bg-scifi-panel border border-scifi-success/50 rounded-lg p-5 mb-6 shadow-neon-green/20 overflow-x-auto relative z-10">
        <div class="absolute top-0 right-0 w-16 h-16 border-t-2 border-r-2 border-scifi-success/40 rounded-tr-lg pointer-events-none"></div>
        <h2 class="text-xl font-semibold text-scifi-success mb-2 border-b border-scifi-border pb-2 uppercase">Sistemi Tattici Rilevati (Slot 8 e 15)</h2>
        <div id="freeSlotsContainer" class="min-w-[600px] mt-4"></div>
    </div>

    <script>
        // ROUTE PROXY (Modificata per Netlify)
        const proxyBaseUrl = '/.netlify/functions/proxy?url=';
        
        let chartInstance = null;

        // --- CACHE DATI ---
        let baseDensityDataset = null; 
        let allPlanetsList = []; 
        let playersMap = {}; 
        let alliancesMap = {}; 
        let occupiedPositions = new Set(); 
        let maxGalaxies = 9; 
        
        // --- STATO ATTIVO ---
        let activeLayers = []; 
        
        // Tavolozza Colori Neon Sci-Fi
        const colorPalette = [
            'rgba(255, 0, 60, 1)',     // Rosso Neon
            'rgba(0, 240, 255, 1)',    // Ciano Neon
            'rgba(255, 235, 59, 1)',   // Giallo
            'rgba(188, 19, 254, 1)',   // Viola Neon
            'rgba(255, 152, 0, 1)',    // Arancio
            'rgba(57, 255, 20, 1)',    // Verde Matrix
            'rgba(255, 20, 147, 1)',   // Deep Pink
            'rgba(255, 255, 255, 1)',  // Bianco puro
            'rgba(0, 123, 255, 1)'     // Blu Elettrico
        ];
        let colorIndex = 0;

        // --- ELEMENTI DOM ---
        const countrySelect = document.getElementById('countrySelect');
        const universeSelect = document.getElementById('universeSelect');
        const loadBtn = document.getElementById('loadBtn');
        const loadingStatusContainer = document.getElementById('loadingStatusContainer');
        const loadingMsg = document.getElementById('loadingMsg');
        const actionSection = document.getElementById('actionSection');
        const allianceList = document.getElementById('allianceList');
        const toggleBackground = document.getElementById('toggleBackground');
        const toggleFreeSlots = document.getElementById('toggleFreeSlots');
        const summaryPanel = document.getElementById('summaryPanel');
        const tableContainer = document.getElementById('tableContainer');
        const allianceSummaryPanel = document.getElementById('allianceSummaryPanel');
        const allianceTableContainer = document.getElementById('allianceTableContainer');
        const freeSlotsPanel = document.getElementById('freeSlotsPanel');
        const freeSlotsContainer = document.getElementById('freeSlotsContainer');
        const exportControls = document.getElementById('exportControls');
        const copyDataBtn = document.getElementById('copyDataBtn');
        const exportCsvBtn = document.getElementById('exportCsvBtn');
        const apiUpdateInfo = document.getElementById('apiUpdateInfo');
        const apiTimestampDisplay = document.getElementById('apiTimestampDisplay');

        // Imposta font per ChartJS globale
        Chart.defaults.font.family = "'Rajdhani', sans-serif";
        Chart.defaults.color = "#aaaaaa";

        // Funzione per scaricare i dati come Testo invece che DOM per EVITARE CRASH
        async function fetchText(targetUrl) {
            const response = await fetch(proxyBaseUrl + encodeURIComponent(targetUrl));
            if (!response.ok) throw new Error('Errore di rete');
            return await response.text();
        }

        function setStatus(msg) {
            loadingMsg.textContent = msg;
        }

        async function loadUniverses() {
            const country = countrySelect.value;
            universeSelect.innerHTML = '<option value="">Scansione comunicazioni...</option>';
            loadBtn.disabled = true;

            try {
                const text = await fetchText(`https://s269-${country}.ogame.gameforge.com/api/universes.xml`);
                // Uso RegEx anche qui per consistenza e velocità
                const uniRegex = /<universe\s+id="(\d+)"\s+href="([^"]+)"/g;
                let match;
                universeSelect.innerHTML = '';
                
                let found = false;
                while ((match = uniRegex.exec(text)) !== null) {
                    found = true;
                    const id = match[1];
                    const href = match[2];
                    
                    const option = document.createElement('option');
                    option.value = href;
                    option.text = `Server ${id} ...`;
                    universeSelect.appendChild(option);

                    // Fetch asincrono del nome
                    fetchText(`${href}/api/serverData.xml`).then(serverData => {
                        const nameMatch = serverData.match(/<name>([^<]+)<\/name>/);
                        if (nameMatch) {
                            option.text = `Server ${id} - ${nameMatch[1]}`;
                        } else {
                            option.text = `Server ${id}`;
                        }
                    }).catch(() => {
                        option.text = `Server ${id}`; 
                    });
                }
                
                if(!found) universeSelect.innerHTML = '<option value="">Nessun server trovato</option>';
                loadBtn.disabled = false;
            } catch (error) {
                universeSelect.innerHTML = '<option value="">Errore uplink</option>';
            }
        }
        countrySelect.addEventListener('change', loadUniverses);
        window.addEventListener('DOMContentLoaded', loadUniverses);

        loadBtn.addEventListener('click', async () => {
            const universeUrl = universeSelect.value;
            if (!universeUrl) return;

            loadingStatusContainer.classList.remove('hidden');
            apiUpdateInfo.classList.add('hidden'); // Nascondi vecchio timestamp
            loadBtn.disabled = true;
            countrySelect.disabled = true;
            universeSelect.disabled = true;

            try {
                setStatus("Connessione ai database Gameforge...");
                
                // Fetch parallelo come TESTO puro (molto più veloce)
                const [universeTxt, playersTxt, alliancesTxt, serverDataTxt] = await Promise.all([
                    fetchText(`${universeUrl}/api/universe.xml`),
                    fetchText(`${universeUrl}/api/players.xml`),
                    fetchText(`${universeUrl}/api/alliances.xml`),
                    fetchText(`${universeUrl}/api/serverData.xml`)
                ]);

                setStatus("Elaborazione decrittazione dati...");

                // Estrazione Timestamp dell'aggiornamento (Novità)
                const tsMatch = universeTxt.match(/timestamp="(\d+)"/);
                if (tsMatch) {
                    const date = new Date(parseInt(tsMatch[1], 10) * 1000);
                    apiTimestampDisplay.textContent = date.toLocaleString('it-IT');
                    apiUpdateInfo.classList.remove('hidden');
                }

                // Uso setTimeout per permettere al browser di aggiornare l'UI prima del calcolo massivo
                await new Promise(resolve => setTimeout(resolve, 50)); 

                // Rilevamento dinamico Galassie (RegEx)
                const galaxyMatch = serverDataTxt.match(/<galaxies>(\d+)<\/galaxies>/);
                maxGalaxies = galaxyMatch ? parseInt(galaxyMatch[1], 10) : 9;

                parseAlliancesFast(alliancesTxt);
                parsePlayersFast(playersTxt);
                parseUniverseFast(universeTxt);

                setStatus("Generazione Mappa Olografica...");
                
                // ATTIVAZIONE PANNELLI (usando l'API classList nativa di Tailwind)
                actionSection.classList.remove('hidden');
                summaryPanel.classList.remove('hidden');
                
                activeLayers = []; 
                colorIndex = 0;
                toggleBackground.checked = true; 
                
                // INIZIALIZZAZIONE DEL GRAFICO
                initChart();

                renderHighlights();
                updateChart();
                generateDensitySummary(); 
                
                if (toggleFreeSlots.checked) {
                    freeSlotsPanel.classList.remove('hidden');
                    generateFreeSlotsSummary();
                }

                renderAllianceSummaries(); 

                loadBtn.textContent = "Dati Aggiornati ✓";
                setStatus("Operazione Completata.");
                setTimeout(() => { 
                    loadingStatusContainer.classList.add('hidden');
                    loadBtn.textContent = "1. Sincronizza Dati"; 
                }, 3000);

            } catch (error) {
                alert("Errore critico durante lo scaricamento dei dati.");
                console.error(error);
                loadingStatusContainer.classList.add('hidden');
            } finally {
                loadBtn.disabled = false;
                countrySelect.disabled = false;
                universeSelect.disabled = false;
            }
        });

        // --- MOTORE DI PARSING ULTRA-VELOCE (REGEX) ---
        function parseAlliancesFast(text) {
            alliancesMap = {};
            allianceList.innerHTML = ''; 
            const allyRegex = /<alliance\s+([^>]+)>/g;
            let match;
            while ((match = allyRegex.exec(text)) !== null) {
                const attrs = match[1];
                const id = (attrs.match(/id="([^"]+)"/) || [])[1];
                const tag = (attrs.match(/tag="([^"]+)"/) || [])[1];
                const name = (attrs.match(/name="([^"]+)"/) || [])[1];
                
                if (id) {
                    alliancesMap[id] = { tag, name };
                    const option = document.createElement('option');
                    option.value = `[${tag}] ${name}`; 
                    allianceList.appendChild(option);
                }
            }
        }

        function getReadableStatus(statusStr) {
            if (!statusStr) return "Attivo";
            let labels = [];
            if (statusStr.includes('v')) labels.push("Vacanza");
            if (statusStr.includes('i') || statusStr.includes('I')) labels.push("Inattivo");
            if (statusStr.includes('b')) labels.push("Bannato");
            if (statusStr.includes('o')) labels.push("Fuorilegge");
            if (statusStr.includes('a')) labels.push("Admin");
            return labels.length > 0 ? labels.join(', ') : "Sconosciuto";
        }

        function parsePlayersFast(text) {
            playersMap = {};
            const playerRegex = /<player\s+([^>]+)>/g;
            let match;
            while ((match = playerRegex.exec(text)) !== null) {
                const attrs = match[1];
                const id = (attrs.match(/id="([^"]+)"/) || [])[1];
                const name = (attrs.match(/name="([^"]+)"/) || [])[1];
                const allianceId = (attrs.match(/alliance="([^"]+)"/) || [])[1] || null;
                const statusStr = (attrs.match(/status="([^"]+)"/) || [])[1] || "";
                
                if (id && name) {
                    playersMap[id] = { 
                        name: name,
                        nameLower: name.toLowerCase(),
                        allianceId: allianceId,
                        statusText: getReadableStatus(statusStr)
                    };
                }
            }
        }

        function parseUniverseFast(text) {
            const densityMap = {};
            allPlanetsList = []; 
            occupiedPositions.clear();

            const planetRegex = /<planet\s+([^>]+)>/g;
            let match;
            while ((match = planetRegex.exec(text)) !== null) {
                const attrs = match[1];
                const playerId = (attrs.match(/player="([^"]+)"/) || [])[1];
                const coordsStr = (attrs.match(/coords="([^"]+)"/) || [])[1];

                if (playerId && coordsStr) {
                    const parts = coordsStr.split(':');
                    const galaxy = parseInt(parts[0], 10);
                    const system = parseInt(parts[1], 10);
                    const position = parseInt(parts[2], 10);
                    
                    if (galaxy > maxGalaxies) continue;

                    allPlanetsList.push({ g: galaxy, s: system, p: position, playerId: playerId });
                    occupiedPositions.add(`${galaxy}-${system}-${position}`);

                    const key = `${galaxy}-${system}`;
                    if (!densityMap[key]) densityMap[key] = { g: galaxy, s: system, count: 0 };
                    densityMap[key].count += 1;
                }
            }

            const universeDataArray = Object.values(densityMap).map(item => ({
                x: item.s,
                y: item.g,
                r: Math.max(1.5, item.count * 1.5) // Aumentata visibilità base
            }));

            baseDensityDataset = {
                label: 'Densità Universo',
                data: universeDataArray,
                backgroundColor: 'rgba(0, 240, 255, 0.15)', // Ciano trasparente
                borderColor: 'rgba(0, 240, 255, 0.3)',
                borderWidth: 1,
                hidden: false
            };
        }

        // --- TABELLE UI ---
        
        function styleTableHTML(thead, tbody) {
            return `
                <table class="w-full text-left">
                    <thead class="bg-scifi-bg border-b-2 border-scifi-accent/50 text-scifi-accent">
                        ${thead}
                    </thead>
                    <tbody class="divide-y divide-scifi-border">
                        ${tbody}
                    </tbody>
                </table>
            `;
        }

        function generateFreeSlotsSummary() {
            let thead = `<tr>
                            <th class="p-3">GAL</th>
                            <th class="p-3">Slot 8 (Disponibili)</th>
                            <th class="p-3">Slot 15 (Disponibili)</th>
                        </tr>`;
            let tbody = '';

            for (let g = 1; g <= maxGalaxies; g++) {
                let free8 = [];
                let free15 = [];
                
                for (let s = 1; s <= 499; s++) {
                    if (!occupiedPositions.has(`${g}-${s}-8`)) free8.push(s);
                    if (!occupiedPositions.has(`${g}-${s}-15`)) free15.push(s);
                }

                tbody += `
                    <tr class="hover:bg-scifi-border/30 transition-colors">
                        <td class="p-3 font-bold text-scifi-success">G${g}</td>
                        <td class="p-3 align-top">
                            <div class="scrollable-list">
                                ${free8.length > 0 ? free8.join(', ') : '<span class="text-scifi-danger">Nessuna</span>'}
                            </div>
                            <div class="slot-count">Totale: ${free8.length}</div>
                        </td>
                        <td class="p-3 align-top">
                            <div class="scrollable-list">
                                ${free15.length > 0 ? free15.join(', ') : '<span class="text-scifi-danger">Nessuna</span>'}
                            </div>
                            <div class="slot-count">Totale: ${free15.length}</div>
                        </td>
                    </tr>
                `;
            }

            freeSlotsContainer.innerHTML = styleTableHTML(thead, tbody);
        }

        toggleFreeSlots.addEventListener('change', (e) => {
            if (e.target.checked && allPlanetsList.length > 0) {
                freeSlotsPanel.classList.remove('hidden');
                generateFreeSlotsSummary();
            } else {
                freeSlotsPanel.classList.add('hidden');
            }
        });

        function generateDensitySummary() {
            const ranges = {};
            for(let g = 1; g <= maxGalaxies; g++) ranges[g] = [0,0,0,0,0];

            allPlanetsList.forEach(p => {
                if (p.g < 1 || p.g > maxGalaxies) return;
                let rangeIdx = 0;
                if (p.s > 100 && p.s <= 200) rangeIdx = 1;
                else if (p.s > 200 && p.s <= 300) rangeIdx = 2;
                else if (p.s > 300 && p.s <= 400) rangeIdx = 3;
                else if (p.s > 400) rangeIdx = 4;
                
                ranges[p.g][rangeIdx]++;
            });

            let thead = `<tr>
                            <th class="p-3">GAL</th>
                            <th class="p-3">Sist. 1-100</th>
                            <th class="p-3">Sist. 101-200</th>
                            <th class="p-3">Sist. 201-300</th>
                            <th class="p-3">Sist. 301-400</th>
                            <th class="p-3">Sist. 401-499</th>
                            <th class="p-3 text-scifi-success">Totale</th>
                        </tr>`;
            let tbody = '';

            for (let g = 1; g <= maxGalaxies; g++) {
                const rData = ranges[g];
                const total = rData.reduce((a, b) => a + b, 0);
                tbody += `
                    <tr class="hover:bg-scifi-border/30 transition-colors">
                        <td class="p-3 font-bold text-scifi-accent">G${g}</td>
                        <td class="p-3">${rData[0]}</td>
                        <td class="p-3">${rData[1]}</td>
                        <td class="p-3">${rData[2]}</td>
                        <td class="p-3">${rData[3]}</td>
                        <td class="p-3">${rData[4]}</td>
                        <td class="p-3 font-bold text-scifi-success">${total}</td>
                    </tr>
                `;
            }
            tableContainer.innerHTML = styleTableHTML(thead, tbody);
        }

        function renderAllianceSummaries() {
            const container = document.getElementById('allianceTableContainer');
            container.innerHTML = '';
            
            const allianceLayers = activeLayers.filter(layer => layer.type === 'alliance');
            
            if (allianceLayers.length === 0) {
                allianceSummaryPanel.classList.add('hidden');
                return;
            }
            
            allianceSummaryPanel.classList.remove('hidden');

            const combinedGrid = {};
            for (let g = 1; g <= maxGalaxies; g++) combinedGrid[g] = [[], [], [], [], []];

            const allAllyPlanets = [];
            allianceLayers.forEach(layer => {
                layer.dataset.data.forEach(p => {
                    allAllyPlanets.push({
                        ...p, 
                        allianceTag: layer.allianceTag,
                        color: layer.color
                    });
                });
            });

            allAllyPlanets.forEach(p => {
                const g = p.y;
                const s = p.x;
                if (g >= 1 && g <= maxGalaxies) {
                    let rangeIdx = 0;
                    if (s > 100 && s <= 200) rangeIdx = 1;
                    else if (s > 200 && s <= 300) rangeIdx = 2;
                    else if (s > 300 && s <= 400) rangeIdx = 3;
                    else if (s > 400) rangeIdx = 4;
                    
                    combinedGrid[g][rangeIdx].push({ name: p.playerName, tag: p.allianceTag, color: p.color });
                }
            });

            let shadowThead = `<tr>
                            <th class="p-3">GAL</th>
                            <th class="p-3">Sist. 1-100</th>
                            <th class="p-3">Sist. 101-200</th>
                            <th class="p-3">Sist. 201-300</th>
                            <th class="p-3">Sist. 301-400</th>
                            <th class="p-3">Sist. 401-499</th>
                        </tr>`;
            let tbody = '';

            for (let g = 1; g <= maxGalaxies; g++) {
                tbody += `<tr class="hover:bg-scifi-border/30 transition-colors"><td class="p-3 font-bold text-scifi-accent">G${g}</td>`;
                
                for(let rangeIdx=0; rangeIdx<5; rangeIdx++) {
                    const cellPlanets = combinedGrid[g][rangeIdx];
                    let cellHtml = '';
                    
                    if (cellPlanets.length > 0) {
                        const conteggio = {};
                        cellPlanets.forEach(p => {
                            const key = `${p.name}___${p.tag}___${p.color}`;
                            conteggio[key] = (conteggio[key] || 0) + 1;
                        });
                        
                        const playerStrings = Object.entries(conteggio).map(([key, count]) => {
                            const [name, tag, color] = key.split('___');
                            return `
                                <div class="player-item">
                                    <strong class="text-white">${name}</strong> (${count})
                                    <strong style="color:${color}; text-shadow: 0 0 4px ${color};">[${tag}]</strong>
                                </div>`;
                        }).sort(); 
                        
                        cellHtml = playerStrings.join('');
                    } else {
                        cellHtml = '<span class="text-scifi-border">-</span>';
                    }
                    
                    tbody += `<td class="p-3 align-top">${cellHtml}</td>`;
                }
                
                tbody += `</tr>`;
            }
            container.innerHTML = styleTableHTML(shadowThead, tbody);
        }

        // --- GESTIONE GRAFICO (CHART.JS) ---
        function initChart() {
            const ctx = document.getElementById('universeMap').getContext('2d');
            if (chartInstance) chartInstance.destroy(); 

            chartInstance = new Chart(ctx, {
                type: 'bubble',
                data: { datasets: [baseDensityDataset] }, 
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { 
                            title: { display: true, text: 'SISTEMA SOLARE (1 - 499)', color: '#00f0ff', font: { size: 14, weight: 'bold' } }, 
                            min: 0, 
                            max: 500, 
                            ticks: { color: '#64748b' }, 
                            grid: { color: 'rgba(0, 240, 255, 0.05)' } 
                        },
                        y: { 
                            title: { display: true, text: `GALASSIA (1 - ${maxGalaxies})`, color: '#00f0ff', font: { size: 14, weight: 'bold' } }, 
                            min: 0, 
                            max: maxGalaxies + 1, 
                            reverse: true, 
                            ticks: { color: '#64748b', stepSize: 1 }, 
                            grid: { color: 'rgba(0, 240, 255, 0.05)' } 
                        }
                    },
                    plugins: {
                        legend: { display: false }, 
                        tooltip: {
                            backgroundColor: 'rgba(19, 21, 32, 0.95)',
                            titleColor: '#00f0ff',
                            bodyColor: '#e2e8f0',
                            borderColor: '#00f0ff',
                            borderWidth: 1,
                            padding: 10,
                            callbacks: {
                                label: function(ctx) {
                                    if (ctx.datasetIndex === 0) {
                                        const count = Math.round(ctx.raw.r / 1.5);
                                        return `SETTORE [${ctx.raw.y}:${ctx.raw.x}] - Presenze: ${count}`;
                                    } else {
                                        const statusStr = ctx.raw.playerStatus ? ` (${ctx.raw.playerStatus})` : '';
                                        const playerInfo = ctx.raw.playerName ? ` - ${ctx.raw.playerName}` : '';
                                        const pos = ctx.raw.p ? `:${ctx.raw.p}` : '';
                                        return `${ctx.dataset.label}${playerInfo}${statusStr} » [${ctx.raw.y}:${ctx.raw.x}${pos}]`;
                                    }
                                }
                            }
                        }
                    }
                }
            });
        }

        function updateChart() {
            chartInstance.data.datasets = [baseDensityDataset, ...activeLayers.map(layer => layer.dataset)];
            chartInstance.update();
        }

        toggleBackground.addEventListener('change', (e) => {
            baseDensityDataset.hidden = !e.target.checked;
            updateChart();
        });

        // --- HIGHLIGHTS E INTERAZIONI ---
        function renderHighlights() {
            const container = document.getElementById('activeHighlights');
            container.innerHTML = '';
            
            activeLayers.forEach((layer, index) => {
                const badge = document.createElement('div');
                badge.className = 'badge text-black'; 
                badge.style.backgroundColor = layer.dataset.backgroundColor;
                badge.style.boxShadow = `0 0 8px ${layer.dataset.backgroundColor}`; 
                
                badge.innerHTML = `
                    <span>${layer.label}</span>
                    <div class="badge-close text-white hover:bg-black/40" onclick="removeHighlight(${index})">✕</div>
                `;
                container.appendChild(badge);
            });

            // Mostra o nascondi bottoni Export usando Tailwind
            if(activeLayers.length > 0) {
                exportControls.classList.remove('hidden');
            } else {
                exportControls.classList.add('hidden');
            }
        }

        window.removeHighlight = function(index) {
            activeLayers.splice(index, 1);
            renderHighlights();
            updateChart();
            renderAllianceSummaries(); 
        };

        function getNextColor() {
            const color = colorPalette[colorIndex];
            colorIndex = (colorIndex + 1) % colorPalette.length;
            return color;
        }

        document.getElementById('addPlayerBtn').addEventListener('click', () => {
            const inputVal = document.getElementById('playerName').value.trim().toLowerCase();
            if (!inputVal) return;

            let targetId = null;
            for (const [id, data] of Object.entries(playersMap)) {
                if (data.nameLower === inputVal) {
                    targetId = id;
                    break;
                }
            }

            if (!targetId) return alert("Giocatore non trovato nei log server.");
            const pData = playersMap[targetId];

            const playerSpots = allPlanetsList
                .filter(p => p.playerId === targetId)
                .map(p => ({ 
                    x: p.s, y: p.g, p: p.p, r: 8, 
                    playerName: pData.name, 
                    playerStatus: pData.statusText 
                }));

            if (playerSpots.length === 0) return alert("Il giocatore non possiede strutture fisiche registrate.");

            const layerColor = getNextColor();

            activeLayers.push({
                type: 'player',
                label: `Ply: ${pData.name}`,
                allianceTag: '', 
                dataset: {
                    label: `Ply: ${pData.name}`,
                    data: playerSpots,
                    backgroundColor: layerColor,
                    borderColor: '#ffffff',
                    borderWidth: 1
                }
            });

            document.getElementById('playerName').value = ""; 
            renderHighlights();
            updateChart();
        });

        document.getElementById('addAllianceBtn').addEventListener('click', () => {
            const inputVal = document.getElementById('allianceInput').value.trim().toLowerCase();
            if (!inputVal) return;

            let targetId = null;
            for (const [id, data] of Object.entries(alliancesMap)) {
                const fullString = `[${data.tag}] ${data.name}`.toLowerCase();
                if (fullString === inputVal || data.tag.toLowerCase() === inputVal || data.name.toLowerCase() === inputVal) {
                    targetId = id;
                    break;
                }
            }

            if (!targetId) return alert("Fazione non rilevata dai sensori.");

            const allianceSpots = [];
            allPlanetsList.forEach(p => {
                const player = playersMap[p.playerId];
                if (player && player.allianceId === targetId) {
                    allianceSpots.push({ 
                        x: p.s, y: p.g, p: p.p, r: 7, 
                        playerName: player.name, 
                        playerStatus: player.statusText 
                    });
                }
            });

            if (allianceSpots.length === 0) return alert("Nessun pianeta rilevato per questa fazione.");

            const layerColor = getNextColor();
            const allianceTag = alliancesMap[targetId].tag;

            activeLayers.push({
                type: 'alliance',
                label: `Ally: [${allianceTag}]`,
                allianceTag: allianceTag,
                color: layerColor,
                dataset: {
                    label: `Ally: [${allianceTag}]`,
                    data: allianceSpots,
                    backgroundColor: layerColor,
                    borderColor: '#ffffff',
                    borderWidth: 1
                }
            });

            document.getElementById('allianceInput').value = ""; 
            renderHighlights();
            updateChart();
            renderAllianceSummaries(); 
        });

        // --- SISTEMA DI ESPORTAZIONE DATI (COPIA / CSV) ---
        function getExportData() {
            let exportList = [];
            activeLayers.forEach(layer => {
                layer.dataset.data.forEach(p => {
                    exportList.push({
                        name: p.playerName,
                        tag: layer.allianceTag,
                        g: p.y,
                        s: p.x,
                        p: p.p,
                        status: p.playerStatus
                    });
                });
            });

            // Ordinamento galattico: Galassia -> Sistema -> Posizione
            exportList.sort((a, b) => {
                if (a.g !== b.g) return a.g - b.g;
                if (a.s !== b.s) return a.s - b.s;
                return a.p - b.p;
            });

            return exportList;
        }

        copyDataBtn.addEventListener('click', () => {
            const data = getExportData();
            if (data.length === 0) return alert("Nessun target selezionato.");

            let text = "Rapporto Posizioni Strategiche\n==============================\n";
            data.forEach(d => {
                let tagStr = d.tag ? `[${d.tag}] ` : '';
                text += `${tagStr}${d.name} -> [${d.g}:${d.s}:${d.p}] (${d.status})\n`;
            });

            navigator.clipboard.writeText(text).then(() => {
                const originalText = copyDataBtn.innerHTML;
                copyDataBtn.innerHTML = "✅ DATI COPIATI";
                setTimeout(() => { copyDataBtn.innerHTML = originalText; }, 2000);
            }).catch(err => {
                alert("Errore di scrittura nella clipboard.");
            });
        });

        exportCsvBtn.addEventListener('click', () => {
            const data = getExportData();
            if (data.length === 0) return alert("Nessun target selezionato.");

            let csv = "Giocatore,Alleanza,Galassia,Sistema,Posizione,Coordinate,Stato\n";
            data.forEach(d => {
                let safeName = d.name.replace(/"/g, '""');
                let coords = `[${d.g}:${d.s}:${d.p}]`;
                csv += `"${safeName}","${d.tag || ''}",${d.g},${d.s},${d.p},"${coords}","${d.status}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", "ogame_radar_export.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

    </script>
</body>
